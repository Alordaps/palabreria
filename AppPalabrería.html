<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palabrería">
<title>Palabrería</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f2ead8;
    --cream-dim: #b8b0a0;
    --red: #c94c4c;
    --red-light: #e87a7a;
    --green: #4caa6e;
    --green-light: #7acca0;
    --text: #f2ead8;
    --text-dim: #8a8278;
    --radius: 20px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { 
    position: fixed; inset: 0; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity .4s ease, transform .4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

  /* ── INTRO SCREEN ── */
  #intro {
    background: var(--bg);
    gap: 32px;
  }
  .logo-wrap { text-align: center; }
  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(201,168,76,.3);
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; width: 100%; max-width: 380px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    border: 1px solid rgba(201,168,76,.1);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--gold);
    display: block;
  }
  .stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: .5px; }

  .btn-start {
    width: 100%; max-width: 380px;
    padding: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 17px; font-weight: 600;
    color: var(--bg);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 8px 32px rgba(201,168,76,.3);
    letter-spacing: .5px;
  }
  .btn-start:active { transform: scale(.97); box-shadow: 0 4px 16px rgba(201,168,76,.2); }

  .btn-upload {
    width: 100%; max-width: 380px;
    padding: 16px;
    background: transparent;
    border: 1.5px solid rgba(201,168,76,.3);
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-upload:active { border-color: var(--gold); color: var(--gold); }
  #file-input { display: none; }

  /* ── CARD SCREEN ── */
  #card-screen {
    gap: 0;
    justify-content: flex-start;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    width: 100%; 
    padding: 52px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg);
  }
  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .progress-text { font-size: 12px; color: var(--text-dim); }
  .progress-bar-wrap {
    width: 120px; height: 3px;
    background: var(--surface2);
    border-radius: 2px; margin-top: 4px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width .5s ease;
  }
  .topbar-right { display: flex; gap: 8px; }
  .pill {
    padding: 5px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid;
  }
  .pill-fav { background: rgba(201,168,76,.1); color: var(--gold); border-color: rgba(201,168,76,.3); }
  .pill-done { background: rgba(76,170,110,.1); color: var(--green); border-color: rgba(76,170,110,.3); }

  /* Card area */
  .card-area {
    flex: 1;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 16px 20px;
    position: relative;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 28px;
    padding: 40px 32px;
    border: 1px solid rgba(255,255,255,.06);
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    position: relative;
    min-height: 260px;
    display: flex; flex-direction: column; justify-content: center; gap: 24px;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  }
  .card.exit-left { transform: translateX(-110%) rotate(-6deg); opacity: 0; }
  .card.exit-right { transform: translateX(110%) rotate(6deg); opacity: 0; }
  .card.enter { animation: cardEnter .4s cubic-bezier(.34,1.56,.64,1) forwards; }

  @keyframes cardEnter {
    from { transform: scale(.88) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .card-badge {
    position: absolute; top: 20px; right: 20px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 500;
  }
  .card-badge.is-fav { color: var(--gold); }

  .word-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 6vw, 36px);
    line-height: 1.2;
    color: var(--cream);
    letter-spacing: -.5px;
    text-align: center;
  }

  .divider {
    height: 1px; background: rgba(255,255,255,.08); width: 40px;
    align-self: center;
  }

  .def-text {
    font-size: 16px;
    line-height: 1.65;
    color: var(--cream-dim);
    font-weight: 300;
    text-align: center;
  }

  /* Swipe hint */
  .swipe-hint {
    font-size: 11px; color: var(--text-dim);
    text-align: center;
    padding: 0 20px 8px;
    letter-spacing: .5px;
  }

  /* Action buttons */
  .actions {
    width: 100%;
    padding: 12px 20px 32px;
    display: flex; gap: 12px;
    max-width: 480px;
    align-self: center;
  }

  .btn-action {
    flex: 1;
    border: none; border-radius: 18px;
    padding: 18px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    letter-spacing: .2px;
  }
  .btn-action:active { transform: scale(.95); }

  .btn-discard {
    background: rgba(201,76,76,.12);
    color: var(--red-light);
    border: 1.5px solid rgba(201,76,76,.25);
  }
  .btn-discard:active { box-shadow: 0 0 0 3px rgba(201,76,76,.2); }

  .btn-fav {
    background: rgba(201,168,76,.12);
    color: var(--gold-light);
    border: 1.5px solid rgba(201,168,76,.25);
    flex: 1.4;
  }
  .btn-fav:active { box-shadow: 0 0 0 3px rgba(201,168,76,.2); }

  .btn-action .icon { font-size: 22px; }
  .btn-action .label { font-size: 12px; opacity: .8; }

  /* ── FINISHED SCREEN ── */
  #finished {
    gap: 28px;
    background: var(--bg);
  }
  .finished-icon { font-size: 64px; }
  .finished-title {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    text-align: center;
    color: var(--cream);
  }
  .finished-sub {
    font-size: 14px; color: var(--text-dim); text-align: center; line-height: 1.6;
    max-width: 300px;
  }
  .finished-stats {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px;
    width: 100%; max-width: 380px;
    display: flex; justify-content: space-around;
    border: 1px solid rgba(201,168,76,.1);
  }
  .f-stat { text-align: center; }
  .f-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--gold);
    display: block;
  }
  .f-stat-lbl { font-size: 12px; color: var(--text-dim); }

  .btn-restart {
    width: 100%; max-width: 380px;
    padding: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 17px; font-weight: 600;
    color: var(--bg); cursor: pointer;
    transition: transform .15s;
  }
  .btn-restart:active { transform: scale(.97); }
  .btn-home {
    background: transparent; border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 16px; padding: 16px;
    width: 100%; max-width: 380px;
    font-size: 14px; color: var(--text-dim);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .15s;
  }
  .btn-home:active { border-color: var(--gold); color: var(--gold); }

  /* Upload feedback */
  .upload-msg {
    font-size: 13px; color: var(--green); text-align: center;
    max-width: 380px;
    display: none;
  }
  .upload-msg.show { display: block; }
  .upload-msg.error { color: var(--red-light); }
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen" id="intro">
  <div class="logo-wrap">
    <div class="logo-icon">📖</div>
    <div class="logo-title">Palabrería</div>
    <div class="logo-sub">Tu vocabulario</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">—</span>
      <div class="stat-lbl">palabras</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-fav">—</span>
      <div class="stat-lbl">favoritas</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-done">—</span>
      <div class="stat-lbl">vistas</div>
    </div>
  </div>

  <button class="btn-start" onclick="startSession()">Empezar →</button>

  <label class="btn-upload" for="file-input">
    <span>📂</span>
    <span>Cargar nuevo Excel</span>
  </label>
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(event)">
  <div class="upload-msg" id="upload-msg"></div>
</div>

<!-- CARD SCREEN -->
<div class="screen hidden" id="card-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="progress-text" id="progress-text">Cargando...</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="pill pill-fav" id="pill-fav">❤️ 0</div>
      <div class="pill pill-done" id="pill-done" onclick="openDiscarded()" style="cursor:pointer">✕ 0</div>
    </div>
  </div>

  <div class="card-area">
    <div class="card enter" id="the-card">
      <div class="card-badge" id="card-badge"></div>
      <div class="word-text" id="word-text">—</div>
      <div class="divider"></div>
      <div class="def-text" id="def-text">—</div>
    </div>
  </div>

  <div class="swipe-hint">Desliza o usa los botones</div>

  <div class="actions">
    <button class="btn-action btn-discard" onclick="doDiscard()">
      <span class="icon">✕</span>
      <span class="label">Descartar</span>
    </button>
    <button class="btn-action btn-fav" onclick="doFav()">
      <span class="icon">❤️</span>
      <span class="label">Me interesa</span>
    </button>
  </div>
</div>

<!-- FINISHED -->
<div class="screen hidden" id="finished">
  <div class="finished-icon">🎉</div>
  <div class="finished-title">¡Vuelta completada!</div>
  <div class="finished-sub" id="finished-sub">Has visto todas las palabras. Ahora solo girarán tus favoritas.</div>
  <div class="finished-stats">
    <div class="f-stat">
      <span class="f-stat-num" id="f-num-fav">0</span>
      <div class="f-stat-lbl">Favoritas</div>
    </div>
    <div class="f-stat">
      <span class="f-stat-num" id="f-num-disc">0</span>
      <div class="f-stat-lbl">Descartadas</div>
    </div>
  </div>
  <button class="btn-restart" onclick="restartWithFavs()">Seguir repasando favoritas →</button>
  <button class="btn-home" onclick="goHome()">Volver al inicio</button>
</div>

<script>
// ─── DATA STORE ─────────────────────────────────────────────────────────────
// Built-in words (embedded)
const BUILTIN_WORDS = [{"w": "Equidistante", "d": "A la misma distancia entre dos puntos."}, {"w": "Deponer", "d": "Abandonar un cargo o una postura."}, {"w": "Resquicio", "d": "Abertura pequeña por donde puede colarse algo."}, {"w": "Cosmopolita", "d": "Abierto al mundo, sin apego local."}, {"w": "Pulular", "d": "Abundar o multiplicarse de manera desordenada."}, {"w": "Hastío (hastiar: causar hastío)", "d": "Aburrimiento profundo y sostenido."}, {"w": "Caricaturización", "d": "Acción de convertir en caricatura."}, {"w": "Subsunción", "d": "Acción de incluir algo en una categoría más amplia."}, {"w": "Intromisión", "d": "Acción de intervenir sin autorización."}, {"w": "Desaguisado/a", "d": "Hecho contra la ley o la razón."}, {"w": "Preterintencional", "d": "Acción no querida pero que causa un daño no deseado."}, {"w": "Vileza", "d": "Acción o cualidad despreciable o vil."}, {"w": "Sabotaje", "d": "Acción para dañar algo de forma oculta o traicionera."}, {"w": "Aprobación", "d": "Aceptación o consentimiento de algo."}, {"w": "Comulgar", "d": "Aceptar una idea o creencia como propia."}, {"w": "Asumir", "d": "Aceptar una responsabilidad o situación."}, {"w": "Acatar", "d": "Aceptar y cumplir una orden o norma."}, {"w": "Atinar", "d": "Acertar o dar con lo correcto."}, {"w": "Dilucidar", "d": "Aclarar o explicar algo confuso."}, {"w": "Matizar", "d": "Aclarar o explicar un aspecto o idea."}, {"w": "Histrionismo", "d": "Actitud afectada y exagerada, propia del histrión."}, {"w": "Altivez/a", "d": "Actitud altiva o de superioridad."}, {"w": "Convencionalismo", "d": "Actitud basada en normas sociales aceptadas."}, {"w": "Condescendencia", "d": "Actitud condescendiente con alguien inferior."}, {"w": "Recato", "d": "Actitud de recato o pudor."}, {"w": "Reticencia", "d": "Actitud de reserva o desconfianza."}, {"w": "Pleitesía", "d": "Actitud de respeto o sumisión."}, {"w": "Descaro", "d": "Actitud insolente o atrevida."}, {"w": "Matonismo", "d": "Actitud o comportamiento prop // State stored in memory + localStorage fallback
let state = {
  words: [],          // full list (word + def)
  queue: [],          // indices left to show this round
  favs: new Set(),    // indices marked as fav
  discarded: new Set(), // indices marked as discarded
  seen: new Set(),    // all seen so far
  onlyFavs: false,    // in fav-only mode
  current: null,      // current index
};

function saveState() {
  try {
    const data = {
      favs: [...state.favs],
      discarded: [...state.discarded],
      seen: [...state.seen],
      onlyFavs: state.onlyFavs,
    };
    localStorage.setItem('palabreria_state', JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('palabreria_state');
    if (!raw) return;
    const data = JSON.parse(raw);
    state.favs = new Set(data.favs || []);
    state.discarded = new Set(data.discarded || []);
    state.seen = new Set(data.seen || []);
    state.onlyFavs = data.onlyFavs || false;
  } catch(e) {}
}

// Load custom words from localStorage if user uploaded
function loadCustomWords() {
  try {
    const raw = localStorage.getItem('palabreria_custom_words');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function init() {
  const custom = loadCustomWords();
  state.words = custom || BUILTIN_WORDS;
  loadState();
  updateIntroStats();
}

function updateIntroStats() {
  const total = state.words.length;
  const favCount = state.favs.size;
  const seenCount = state.seen.size;
  document.getElementById('stat-total').textContent = total.toLocaleString('es');
  document.getElementById('stat-fav').textContent = favCount;
  document.getElementById('stat-done').textContent = seenCount;
}

// ─── SESSION ─────────────────────────────────────────────────────────────────
function buildQueue() {
  const allIdx = state.words.map((_, i) => i);

  if (state.onlyFavs) {
    let pool = allIdx.filter(i => state.favs.has(i));
    if (pool.length === 0) {
      // No favs — go back to unseen
      state.onlyFavs = false;
      pool = allIdx.filter(i => !state.seen.has(i) && !state.discarded.has(i));
      if (pool.length === 0) pool = allIdx.filter(i => !state.discarded.has(i));
    }
    return shuffle(pool);
  }

  // Normal mode: unseen first (in order they appear — newest first since prepended)
  const unseen = allIdx.filter(i => !state.seen.has(i) && !state.discarded.has(i));
  if (unseen.length > 0) {
    // Don't shuffle unseen — keep natural order so newest appear first
    // But do reverse so queue.pop() gives index 0 first
    return unseen.slice().reverse();
  }

  // All seen — switch to favs only loop
  const favPool = allIdx.filter(i => state.favs.has(i));
  if (favPool.length > 0) {
    state.onlyFavs = true;
    return shuffle(favPool);
  }

  // No favs either — show everything non-discarded again
  state.seen = new Set();
  saveState();
  return shuffle(allIdx.filter(i => !state.discarded.has(i)));
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession() {
  state.queue = buildQueue();
  if (state.queue.length === 0) {
    // Nothing to show
    showScreen('finished');
    return;
  }
  showScreen('card-screen');
  nextCard(true);
}

function nextCard(first = false) {
  if (state.queue.length === 0) {
    // Round finished
    endRound();
    return;
  }
  state.current = state.queue.pop();
  const word = state.words[state.current];
  
  document.getElementById('word-text').textContent = word.w;
  document.getElementById('def-text').textContent = word.d;

  const badge = document.getElementById('card-badge');
  if (state.favs.has(state.current)) {
    badge.textContent = '❤️ favorita';
    badge.className = 'card-badge is-fav';
  } else {
    badge.textContent = '';
    badge.className = 'card-badge';
  }

  const card = document.getElementById('the-card');
  card.classList.remove('exit-left', 'exit-right', 'enter');
  void card.offsetWidth; // reflow
  if (!first) card.classList.add('enter');

  updateProgress();
}

function updateProgress() {
  const total = state.words.filter((_, i) => !state.discarded.has(i)).length;
  const done = state.seen.size;
  const favCount = state.favs.size;
  const discCount = state.discarded.size;

  const shown = total - state.queue.length;
  const pct = total > 0 ? Math.round((shown / total) * 100) : 0;

  document.getElementById('progress-text').textContent = 
    state.onlyFavs ? `Solo favoritas · ${state.queue.length + 1} restantes` 
                   : `${done.toLocaleString('es')} de ${state.words.length.toLocaleString('es')} vistas`;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pill-fav').textContent = '❤️ ' + favCount;
  document.getElementById('pill-done').textContent = '✕ ' + discCount;
}

function animateCard(dir, cb) {
  const card = document.getElementById('the-card');
  card.classList.add(dir === 'left' ? 'exit-left' : 'exit-right');
  setTimeout(cb, 280);
}

function doDiscard() {
  if (state.current === null) return;
  const idx = state.current;
  animateCard('left', () => {
    state.favs.delete(idx);
    state.discarded.add(idx);
    state.seen.add(idx);
    saveState();
    nextCard();
  });
}

function doFav() {
  if (state.current === null) return;
  const idx = state.current;
  animateCard('right', () => {
    state.favs.add(idx);
    state.discarded.delete(idx);
    state.seen.add(idx);
    saveState();
    nextCard();
  });
}

function endRound() {
  state.onlyFavs = state.favs.size > 0;
  saveState();

  document.getElementById('f-num-fav').textContent = state.favs.size;
  document.getElementById('f-num-disc').textContent = state.discarded.size;

  if (state.onlyFavs) {
    document.getElementById('finished-sub').textContent = 
      'Has completado una vuelta. Ahora tus favoritas seguirán rotando.';
    document.querySelector('.btn-restart').textContent = 'Seguir repasando favoritas →';
  } else {
    document.getElementById('finished-sub').textContent = 
      'No tienes favoritas guardadas aún. ¡Marca las que te interesen!';
  }

  showScreen('finished');
}

function restartWithFavs() {
  state.onlyFavs = state.favs.size > 0;
  startSession();
}

function goHome() {
  showScreen('intro');
  updateIntroStats();
}

// ─── FILE UPLOAD ──────────────────────────────────────────────────────────────
function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();
  const msg = document.getElementById('upload-msg');

  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const words = parseCSV(text);
      if (words.length > 0) {
        applyNewWords(words, msg);
      } else {
        showMsg(msg, 'No se encontraron palabras en el CSV.', true);
      }
    };
    reader.readAsText(file);
  } else if (ext === 'xlsx' || ext === 'xls') {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const words = parseXLSX(data);
        if (words.length > 0) {
          applyNewWords(words, msg);
        } else {
          showMsg(msg, 'No se encontraron palabras. Asegúrate de tener columnas Palabra y Definición.', true);
        }
      } catch(err) {
        showMsg(msg, 'Error al leer el Excel. Prueba a guardarlo como CSV.', true);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showMsg(msg, 'Formato no soportado. Usa .xlsx o .csv', true);
  }

  event.target.value = '';
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const words = [];
  for (const line of lines) {
    const parts = line.split(/\t|;|,/);
    if (parts.length >= 2) {
      const w = parts[0].trim().replace(/^["']|["']$/g, '');
      const d = parts[1].trim().replace(/^["']|["']$/g, '');
      if (w && d && w.toLowerCase() !== 'palabra') {
        words.push({w, d});
      }
    }
  }
  return words;
}

function parseXLSX(data) {
  // Simple xlsx parser — read shared strings + sheet data
  try {
    // We rely on SheetJS loaded below
    const wb = XLSX.read(data, {type: 'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header: 1});
    const words = [];
    for (const row of rows) {
      if (row.length >= 2) {
        const w = String(row[0] || '').trim();
        const d = String(row[1] || '').trim();
        if (w && d && w.toLowerCase() !== 'palabra') {
          words.push({w, d});
        }
      }
    }
    return words;
  } catch(e) {
    throw e;
  }
}

function applyNewWords(words, msg) {
  try {
    // Build a map of existing words by normalized text → index
    const existingMap = new Map();
    state.words.forEach((w, i) => existingMap.set(w.w.trim().toLowerCase(), i));

    const newWords = [];      // brand new words to prepend
    let updatedDefs = 0;      // count of updated definitions

    for (const incoming of words) {
      const key = incoming.w.trim().toLowerCase();
      if (!existingMap.has(key)) {
        // Completely new word
        newWords.push(incoming);
      } else {
        // Word exists — check if definition changed
        const idx = existingMap.get(key);
        if (state.words[idx].d.trim() !== incoming.d.trim()) {
          state.words[idx].d = incoming.d.trim();
          updatedDefs++;
        }
        // If identical, do nothing
      }
    }

    if (newWords.length === 0 && updatedDefs === 0) {
      showMsg(msg, 'Tu lista ya está al día, no hay cambios.', false);
      return;
    }

    // Merge: new words first (so they appear first in session), then existing
    const merged = [...newWords, ...state.words];

    // Save merged list
    localStorage.setItem('palabreria_custom_words', JSON.stringify(merged));

    // Remap indices: old index i → i + newWords.length
    const offset = newWords.length;
    const newFavs = new Set([...state.favs].map(i => i + offset));
    const newDiscarded = new Set([...state.discarded].map(i => i + offset));
    const newSeen = new Set([...state.seen].map(i => i + offset));

    state.words = merged;
    state.favs = newFavs;
    state.discarded = newDiscarded;
    state.seen = newSeen;
    state.onlyFavs = false;
    state.queue = [];
    state.current = null;

    saveState();

    let msgParts = [];
    if (newWords.length > 0) msgParts.push(`${newWords.length} palabras nuevas`);
    if (updatedDefs > 0) msgParts.push(`${updatedDefs} definiciones actualizadas`);
    showMsg(msg, `✓ ${msgParts.join(' · ')}. Total: ${merged.length}.`, false);
    updateIntroStats();
  } catch(e) {
    showMsg(msg, 'Error guardando las palabras.', true);
  }
}

function showMsg(el, text, isError) {
  el.textContent = text;
  el.className = 'upload-msg show' + (isError ? ' error' : '');
  setTimeout(() => { el.className = 'upload-msg'; }, 4000);
}

// ─── SCREEN NAV ──────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) s.classList.remove('hidden');
    else s.classList.add('hidden');
  });
}

// ─── SWIPE SUPPORT ────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;

document.getElementById('the-card').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.getElementById('the-card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) doDiscard();
    else doFav();
  }
}, {passive: true});


// ─── DISCARDED MODAL ─────────────────────────────────────────────────────────
function openDiscarded() {
  const modal = document.getElementById('discarded-modal');
  modal.style.display = 'flex';
  renderDiscardedList();
}

function closeDiscarded() {
  document.getElementById('discarded-modal').style.display = 'none';
}

function renderDiscardedList() {
  const list = document.getElementById('discarded-list');
  const discArr = [...state.discarded];
  
  document.getElementById('disc-count-label').textContent = discArr.length + ' palabras';

  if (discArr.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px 20px;font-size:14px">No hay palabras descartadas</div>';
    return;
  }

  // Sort alphabetically
  discArr.sort((a, b) => state.words[a].w.localeCompare(state.words[b].w, 'es'));

  list.innerHTML = discArr.map(idx => {
    const word = state.words[idx];
    return `<div class="disc-item">
      <div class="disc-item-text">
        <div class="disc-word">${word.w}</div>
        <div class="disc-def">${word.d}</div>
      </div>
      <button class="disc-recover" onclick="recoverWord(${idx})" title="Recuperar como favorita">❤️</button>
    </div>`;
  }).join('');
}

function recoverWord(idx) {
  state.discarded.delete(idx);
  state.favs.add(idx);
  state.seen.delete(idx); // so it can appear again
  saveState();
  renderDiscardedList();
  updateProgress();
}

document.head.appendChild(script);

init();
</script>
